<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 财务可视化 — 人生修仙录</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --text: #e0e0e0;
            --text-dim: #888;
            --primary: #ff9800;
            --danger: #e53935;
            --success: #4caf50;
            --accent: #9c27b0;
            --gold: #ffd700;
            --border: #2a2a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: var(--gold); margin-bottom: 24px; font-size: 1.8rem; }
        h1 span { color: var(--primary); }

        /* 统计卡片行 */
        .stats-row { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card {
            flex: 1; min-width: 150px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .label { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 6px; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; }
        .stat-card.expense .value { color: var(--danger); }
        .stat-card.income .value { color: var(--success); }
        .stat-card.balance .value { color: var(--primary); }
        .stat-card.savings .value { color: var(--gold); }

        /* 图表区域 */
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
        }
        .chart-card h3 { margin-bottom: 16px; color: var(--text); font-size: 1rem; }
        .chart-card canvas { max-height: 300px; }

        /* 交易列表 */
        .tx-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .tx-list h3 { margin-bottom: 12px; }
        .tx-table { width: 100%; border-collapse: collapse; }
        .tx-table th, .tx-table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        .tx-table th { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; }
        .tx-table tr:hover { background: rgba(255,255,255,0.02); }
        .tx-table .amount-out { color: var(--danger); font-weight: bold; }
        .tx-table .amount-in { color: var(--success); font-weight: bold; }
        .category-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: rgba(255,152,0,0.15);
            color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        .empty-state .emoji { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 <span>财务可视化</span> 面板</h1>

    <!-- 统计卡片 -->
    <div class="stats-row">
        <div class="stat-card expense">
            <div class="label">📝 总支出</div>
            <div class="value">¥50</div>
        </div>
        <div class="stat-card income">
            <div class="label">💵 总收入</div>
            <div class="value">¥0</div>
        </div>
        <div class="stat-card balance">
            <div class="label">💰 本月结余</div>
            <div class="value">−¥50</div>
        </div>
        <div class="stat-card savings">
            <div class="label">🏦 当前储蓄</div>
            <div class="value">¥0</div>
        </div>
    </div>

    <!-- 图表行 -->
    <div class="chart-grid">
        <div class="chart-card">
            <h3>📊 支出分类占比</h3>
            <canvas id="categoryPie"></canvas>
        </div>
        <div class="chart-card">
            <h3>📈 近30天收支趋势</h3>
            <canvas id="dailyTrend"></canvas>
        </div>
    </div>
    <div class="chart-grid">
        <div class="chart-card">
            <h3>📅 每日支出明细</h3>
            <canvas id="dailyBar"></canvas>
        </div>
        <div class="chart-card">
            <h3>🔴 收支对比</h3>
            <canvas id="incomeExpense"></canvas>
        </div>
    </div>

    <!-- 交易记录表 -->
    <div class="tx-list">
        <h3>📋 全部交易记录</h3>
        <table class="tx-table">
            <thead>
                <tr><th>日期</th><th>类型</th><th>分类/来源</th><th>描述</th><th>金额</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026-07-19</td>
                    <td><span class="category-badge">支出</span></td>
                    <td>交通</td>
                    <td>停车场停车费</td>
                    <td class="amount-out">−¥15.00</td>
                </tr>
                <tr>
                    <td>2026-07-19</td>
                    <td><span class="category-badge">支出</span></td>
                    <td>餐饮</td>
                    <td>午饭</td>
                    <td class="amount-out">−¥35.00</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// ===== 支出分类占比 - 饼图 =====
new Chart(document.getElementById('categoryPie'), {
    type: 'doughnut',
    data: {
        labels: ['餐饮', '交通'],
        datasets: [{
            data: [35, 15],
            backgroundColor: ['#e53935', '#ff9800'],
            borderColor: '#1a1a2e',
            borderWidth: 3,
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'bottom',
                labels: { color: '#e0e0e0', padding: 16, font: { size: 13 } }
            }
        }
    }
});

// ===== 近30天趋势 - 折线图 =====
new Chart(document.getElementById('dailyTrend'), {
    type: 'line',
    data: {
        labels: ['7/19'],
        datasets: [
            {
                label: '支出',
                data: [50],
                borderColor: '#e53935',
                backgroundColor: 'rgba(229,57,53,0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 5,
            },
            {
                label: '收入',
                data: [0],
                borderColor: '#4caf50',
                backgroundColor: 'rgba(76,175,80,0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 5,
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: { color: '#e0e0e0', usePointStyle: true, padding: 16 }
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                grid: { color: '#2a2a4a' },
                ticks: { color: '#888', callback: v => '¥' + v }
            },
            x: {
                grid: { color: '#2a2a4a' },
                ticks: { color: '#888' }
            }
        }
    }
});

// ===== 每日支出柱状图 =====
new Chart(document.getElementById('dailyBar'), {
    type: 'bar',
    data: {
        labels: ['7/19'],
        datasets: [{
            label: '支出 ¥',
            data: [50],
            backgroundColor: ['#e53935', '#ff7043'],
            borderRadius: 8,
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            y: {
                beginAtZero: true,
                grid: { color: '#2a2a4a' },
                ticks: { color: '#888', callback: v => '¥' + v }
            },
            x: {
                grid: { display: false },
                ticks: { color: '#888' }
            }
        }
    }
});

// ===== 收支对比图 =====
new Chart(document.getElementById('incomeExpense'), {
    type: 'bar',
    data: {
        labels: ['7月'],
        datasets: [
            {
                label: '支出',
                data: [50],
                backgroundColor: '#e53935',
                borderRadius: 6,
            },
            {
                label: '收入',
                data: [0],
                backgroundColor: '#4caf50',
                borderRadius: 6,
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: { color: '#e0e0e0', usePointStyle: true, padding: 16 }
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                grid: { color: '#2a2a4a' },
                ticks: { color: '#888', callback: v => '¥' + v }
            },
            x: {
                grid: { display: false },
                ticks: { color: '#888' }
            }
        }
    }
});
</script>
</body>
</html>
