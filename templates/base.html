<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☯ 人生修仙录</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">☯ 人生修仙录</a>
        <div class="nav-links">
            <a href="/learning">🧠 学习</a>
            <a href="/fitness">💪 健身</a>
            <a href="/discipline">🚫 戒律</a>
            <a href="/tasks">📋 任务</a>
            <a href="/earning">💰 赚钱</a>
            <a href="/finance">📒 财务</a>
            <a href="/history">📜 历史</a>
            {% if request.state.is_authenticated %}
            <a href="/logout" style="color:#e53935;">🚪 退出</a>
            {% else %}
            <a href="/login" style="color:#ff9800;">🔒 登录</a>
            {% endif %}
        </div>
    </nav>
    {% if not request.state.is_authenticated %}
    <div style="background:rgba(255,152,0,0.1);border-bottom:1px solid rgba(255,152,0,0.3);text-align:center;padding:8px;font-size:0.85rem;color:#ff9800;">
        👁️ 只读模式 · <a href="/login" style="color:#ff9800;font-weight:bold;">登录</a> 后可修改数据
    </div>
    {% endif %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% if not request.state.is_authenticated %}
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('form[method="post"]').forEach(function(form) {
            form.style.display = 'none';
            var msg = document.createElement('p');
            msg.className = 'empty';
            msg.style.cssText = 'color:#ff9800;padding:12px;border:1px dashed #ff9800;border-radius:8px;margin:8px 0;';
            msg.textContent = '🔒 只读模式 — 请登录后操作';
            form.parentNode.insertBefore(msg, form);
        });
    });
    </script>
    {% endif %}
</body>
</html>
